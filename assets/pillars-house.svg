<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">The Five Pillars supporting Life After Cancer</title>
  <desc id="desc">A Greek-inspired house diagram with five pillars labeled Inspiration, Symptom Care, Nutrition, Research, and Resources supporting a roof labeled Life After Cancer.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbfa"/>
      <stop offset="1" stop-color="#e7eaeb"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f8f6"/>
      <stop offset="1" stop-color="#c9ced1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17191b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#paper)"/>
  <circle cx="1000" cy="142" r="160" fill="#5f756c" opacity="0.08"/>
  <circle cx="206" cy="558" r="190" fill="#c59b55" opacity="0.1"/>

  <g filter="url(#shadow)">
    <polygon points="600 70 162 238 1038 238" fill="#2f3336"/>
    <polygon points="600 104 276 218 924 218" fill="#555b60"/>
    <rect x="216" y="238" width="768" height="46" fill="#c9ced1"/>
    <rect x="248" y="254" width="704" height="14" fill="#eef0f1" opacity="0.8"/>
    <text x="600" y="184" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800" letter-spacing="0.5">LIFE AFTER CANCER</text>

    <g fill="url(#stone)" stroke="#7d858b" stroke-width="2">
      <rect x="185" y="518" width="830" height="38" rx="4"/>
      <rect x="148" y="556" width="904" height="54" rx="5"/>
      <rect x="116" y="610" width="968" height="34" rx="5"/>
    </g>

    <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
      <g transform="translate(222 286)">
        <rect x="-54" y="0" width="108" height="22" rx="4" fill="#7d858b"/>
        <rect x="-42" y="22" width="84" height="204" fill="url(#stone)" stroke="#7d858b" stroke-width="2"/>
        <path d="M-29 38 C-10 54 -10 194 -29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <path d="M29 38 C10 54 10 194 29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <rect x="-58" y="226" width="116" height="24" rx="4" fill="#7d858b"/>
        <text x="0" y="292" fill="#2f3336" font-size="23" font-weight="800">Inspiration</text>
      </g>

      <g transform="translate(411 286)">
        <rect x="-54" y="0" width="108" height="22" rx="4" fill="#7d858b"/>
        <rect x="-42" y="22" width="84" height="204" fill="url(#stone)" stroke="#7d858b" stroke-width="2"/>
        <path d="M-29 38 C-10 54 -10 194 -29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <path d="M29 38 C10 54 10 194 29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <rect x="-58" y="226" width="116" height="24" rx="4" fill="#7d858b"/>
        <text x="0" y="284" fill="#2f3336" font-size="23" font-weight="800">Symptom</text>
        <text x="0" y="312" fill="#2f3336" font-size="23" font-weight="800">Care</text>
      </g>

      <g transform="translate(600 286)">
        <rect x="-54" y="0" width="108" height="22" rx="4" fill="#7d858b"/>
        <rect x="-42" y="22" width="84" height="204" fill="url(#stone)" stroke="#7d858b" stroke-width="2"/>
        <path d="M-29 38 C-10 54 -10 194 -29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <path d="M29 38 C10 54 10 194 29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <rect x="-58" y="226" width="116" height="24" rx="4" fill="#7d858b"/>
        <text x="0" y="292" fill="#2f3336" font-size="23" font-weight="800">Nutrition</text>
      </g>

      <g transform="translate(789 286)">
        <rect x="-54" y="0" width="108" height="22" rx="4" fill="#7d858b"/>
        <rect x="-42" y="22" width="84" height="204" fill="url(#stone)" stroke="#7d858b" stroke-width="2"/>
        <path d="M-29 38 C-10 54 -10 194 -29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <path d="M29 38 C10 54 10 194 29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <rect x="-58" y="226" width="116" height="24" rx="4" fill="#7d858b"/>
        <text x="0" y="292" fill="#2f3336" font-size="23" font-weight="800">Research</text>
      </g>

      <g transform="translate(978 286)">
        <rect x="-54" y="0" width="108" height="22" rx="4" fill="#7d858b"/>
        <rect x="-42" y="22" width="84" height="204" fill="url(#stone)" stroke="#7d858b" stroke-width="2"/>
        <path d="M-29 38 C-10 54 -10 194 -29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <path d="M29 38 C10 54 10 194 29 210" fill="none" stroke="#eef0f1" stroke-width="8" opacity="0.75"/>
        <rect x="-58" y="226" width="116" height="24" rx="4" fill="#7d858b"/>
        <text x="0" y="292" fill="#2f3336" font-size="23" font-weight="800">Resources</text>
      </g>
    </g>

    <text x="600" y="662" text-anchor="middle" fill="#555b60" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Five supports for a stronger survivorship foundation</text>
  </g>
</svg>
